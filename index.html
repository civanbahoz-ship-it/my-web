<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>C21</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0f172a">

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      font-family:Arial;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
    }

    h1{
      font-size:60px;
      margin-bottom:20px;
    }

    input{
      width:320px;
      padding:15px;
      border-radius:30px;
      border:none;
      outline:none;
      font-size:18px;
    }

    button{
      margin-top:10px;
      padding:12px 20px;
      border:none;
      border-radius:25px;
      background:#22c55e;
      color:white;
    }

    /* SPLASH */
    #splash{
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:#0f172a;
      display:flex;
      justify-content:center;
      align-items:center;
      font-size:40px;
      z-index:999;
    }
  </style>
</head>

<body>

<div id="splash">C21</div>

<h1>C21</h1>

<input id="search" placeholder="Search C21...">
<button onclick="go()">Search</button>

<script>
function go(){
  let q = document.getElementById("search").value.toLowerCase().trim();

  if(q === "youtube" || q === "yt"){
    window.open("https://youtube.com");
  }
  else if(q === "google" || q === "g"){
    window.open("https://www.bing.com");
  }
  else if(q === "github"){
    window.open("https://github.com");
  }
  else if(q === "wp" || q === "whatsapp"){
    window.open("https://web.whatsapp.com");
  }
  else if(q === "insta"){
    window.open("https://instagram.com");
  }
  else{
    window.open("https://www.bing.com/search?q=" + q);
  }
}

/* splash screen */
setTimeout(()=>{
  document.getElementById("splash").style.display="none";
},1500);

/* PWA register */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
