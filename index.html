<!DOCTYPE html>
<html>
<head>
  <title>My Search</title>

  <style>
    body {
      margin:0;
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      flex-direction:column;
      font-family:Arial;
      background: linear-gradient(135deg, #0f172a, #1e293b);
      color:white;
    }

    h1 {
      font-size:40px;
      margin-bottom:20px;
      letter-spacing:2px;
    }

    .box {
      display:flex;
      gap:10px;
    }

    input {
      width:300px;
      padding:12px;
      border-radius:25px;
      border:none;
      outline:none;
      font-size:16px;
    }

    button {
      padding:12px 18px;
      border:none;
      border-radius:25px;
      background:#22c55e;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover {
      background:#16a34a;
      transform:scale(1.05);
    }

    ul {
      margin-top:20px;
      list-style:none;
      padding:0;
    }

    li {
      background:rgba(255,255,255,0.1);
      padding:8px 12px;
      margin:5px;
      border-radius:10px;
      backdrop-filter: blur(10px);
    }
  </style>
</head>

<body>

  <h1>My Search</h1>

  <div class="box">
    <input id="search" placeholder="ara..." onkeydown="if(event.key==='Enter'){go()}">
    <button onclick="go()">Search</button>
  </div>

  <ul id="history"></ul>

  <script>
    let history = [];

    function go() {
      let q = document.getElementById("search").value.toLowerCase().trim();
      if(!q) return;

      history.unshift(q);

      document.getElementById("history").innerHTML =
        history.map(i => `<li>${i}</li>`).join("");

      if (q === "youtube") {
        window.open("https://www.youtube.com");
      }
      else if (q === "google") {
        window.open("https://www.google.com");
      }
      else if (q === "github") {
        window.open("https://github.com");
      }
      else {
        alert("Bulunamadı: " + q);
      }

      document.getElementById("search").value = "";
    }
  </script>

</body>
</html>
