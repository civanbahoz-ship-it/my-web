<!DOCTYPE html>
<html>
<head>
  <title>C21</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      font-family:Arial;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
    }

    h1{
      font-size:60px;
      margin-bottom:20px;
      letter-spacing:3px;
    }

    input{
      width:340px;
      padding:15px;
      border-radius:30px;
      border:none;
      outline:none;
      font-size:18px;
    }

    button{
      margin-left:10px;
      padding:15px 20px;
      border:none;
      border-radius:30px;
      background:#22c55e;
      color:white;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:scale(1.05);
      background:#16a34a;
    }

    ul{
      margin-top:25px;
      list-style:none;
      padding:0;
    }

    li{
      background:rgba(255,255,255,0.1);
      padding:8px 12px;
      margin:5px;
      border-radius:10px;
    }
  </style>
</head>

<body>

  <h1>C21</h1>

  <div>
    <input id="search" placeholder="C21 search..." onkeydown="if(event.key==='Enter'){go()}">
    <button onclick="go()">Search</button>
  </div>

  <ul id="history"></ul>

  <script>
    let history = [];

    function go(){
      let q = document.getElementById("search").value.toLowerCase().trim();
      if(!q) return;

      history.unshift(q);

      document.getElementById("history").innerHTML =
        history.map(x => `<li>${x}</li>`).join("");

      // 🔥 MULTI SITE SYSTEM
      if(q.includes("youtube")){
        window.open("https://www.youtube.com");
      }
      else if(q.includes("google")){
        window.open("https://www.google.com");
      }
      else if(q.includes("github")){
        window.open("https://github.com");
      }
      else if(q.includes("wikipedia")){
        window.open("https://www.wikipedia.org");
      }
      else if(q.includes("instagram")){
        window.open("https://www.instagram.com");
      }
      else{
        alert("C21 bulunamadı: " + q);
      }

      document.getElementById("search").value = "";
    }
  </script>

</body>
</html>
