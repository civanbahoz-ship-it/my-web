<!DOCTYPE html>
<html>
<head>
  <title>C21</title>

  <style>
    body{
      margin:0;
      height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      font-family:Arial;
      background:linear-gradient(135deg,#0f172a,#1e293b);
      color:white;
    }

    h1{
      font-size:60px;
      margin-bottom:20px;
      letter-spacing:3px;
    }

    input{
      width:360px;
      padding:15px;
      border-radius:30px;
      border:none;
      outline:none;
      font-size:18px;
    }

    button{
      margin-left:10px;
      padding:15px 20px;
      border:none;
      border-radius:30px;
      background:#22c55e;
      color:white;
      cursor:pointer;
    }

    ul{
      margin-top:25px;
      list-style:none;
      padding:0;
      width:360px;
    }

    li{
      background:rgba(255,255,255,0.1);
      padding:8px 12px;
      margin:5px;
      border-radius:10px;
      text-align:left;
    }
  </style>
</head>

<body>

  <h1>C21</h1>

  <div>
    <input id="search" placeholder="C21 command..." onkeydown="if(event.key==='Enter'){go()}">
    <button onclick="go()">Run</button>
  </div>

  <ul id="history"></ul>

  <script>
    let history = [];

    function go(){
      let q = document.getElementById("search").value.toLowerCase().trim();
      if(!q) return;

      history.unshift(q);

      document.getElementById("history").innerHTML =
        history.map(x => `<li>${x}</li>`).join("");

      // 🔥 C21 COMMAND SYSTEM
      if(q === "youtube" || q === "yt"){
        window.open("https://www.youtube.com");
      }

      else if(q === "google" || q === "g"){
        window.open("https://www.google.com");
      }

      else if(q === "github" || q === "gh"){
        window.open("https://github.com");
      }

      else if(q === "instagram" || q === "insta"){
        window.open("https://www.instagram.com");
      }

      else if(q === "whatsapp" || q === "wp"){
        window.open("https://web.whatsapp.com");
      }

      else if(q === "chatgpt" || q === "ai"){
        window.open("https://chat.openai.com");
      }

      else if(q === "gemini"){
        window.open("https://gemini.google.com");
      }

      else if(q === "tiktok"){
        window.open("https://www.tiktok.com");
      }

      else if(q === "netflix"){
        window.open("https://www.netflix.com");
      }

      else if(q === "reddit"){
        window.open("https://www.reddit.com");
      }

      else{
        alert("C21: Bulunamadı → " + q);
      }

      document.getElementById("search").value = "";
    }
  </script>

</body>
</html>
