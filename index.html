<!DOCTYPE html>
<html>
<head>
  <title>My Search</title>
</head>

<body style="text-align:center; margin-top:150px; font-family:Arial;">

  <h1>My Search</h1>

  <input id="search" placeholder="ara...">
  <button onclick="go()">Ara</button>

  <script>
    function go() {
      let q = document.getElementById("search").value.toLowerCase().trim();

      if (q === "youtube") {
        window.location.href = "https://www.youtube.com";
      }
      else if (q === "google") {
        window.location.href = "https://www.google.com";
      }
      else if (q === "github") {
        window.location.href = "https://github.com";
      }
      else {
        alert("Bulunamadı: " + q);
      }
    }
  </script>

</body>
</html>
