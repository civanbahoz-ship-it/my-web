<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>C21</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f172a">

<style>
body{
  margin:0;
  height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  font-family:Arial;
  background:linear-gradient(135deg,#0f172a,#1e293b);
  color:white;
}

h1{ font-size:60px; margin-bottom:10px; }

input{
  width:320px;
  padding:12px;
  border-radius:25px;
  border:none;
  outline:none;
  font-size:16px;
}

button{
  margin-top:10px;
  padding:10px 18px;
  border:none;
  border-radius:20px;
  background:#22c55e;
  color:white;
  cursor:pointer;
}

.card{
  margin-top:10px;
  width:320px;
  background:rgba(255,255,255,0.1);
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<h1>C21</h1>

<!-- SEARCH -->
<input id="search" placeholder="Search..." onkeydown="if(event.key==='Enter'){go()}">
<button onclick="go()">Search</button>

<!-- AI -->
<input id="ai" placeholder="Ask C21 AI..." onkeydown="if(event.key==='Enter'){askAI()}">
<button onclick="askAI()">AI</button>

<div id="output"></div>

<script>
/* 🔍 SEARCH SYSTEM */
function go(){
  let q = document.getElementById("search").value.toLowerCase().trim();

  if(q === "youtube" || q === "yt"){
    window.open("https://youtube.com");
  }
  else if(q === "google" || q === "g"){
    window.open("https://bing.com");
  }
  else if(q === "github"){
    window.open("https://github.com");
  }
  else if(q === "wp" || q === "whatsapp"){
    window.open("https://web.whatsapp.com");
  }
  else{
    window.open("https://bing.com/search?q=" + q);
  }
}

/* 🤖 AI SYSTEM */
function askAI(){
  let q = document.getElementById("ai").value.toLowerCase().trim();
  let out = document.getElementById("output");

  if(!q) return;

  let reply = "";

  if(q.includes("hello")){
    reply = "Hi 👋 I am C21 AI";
  }
  else if(q.includes("time")){
    reply = new Date().toLocaleTimeString();
  }
  else if(q.includes("youtube")){
    reply = "Opening YouTube...";
    window.open("https://youtube.com");
  }
  else{
    reply = "I don't understand yet.";
  }

  out.innerHTML = `<div class="card">${q} → ${reply}</div>` + out.innerHTML;
}

/* PWA */
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("service-worker.js");
}
</script>

</body>
</html>
